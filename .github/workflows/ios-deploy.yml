# .github/workflows/ios-deploy.yml
#
# Build React Native iOS app dan upload ke App Store Connect (TestFlight/App Store)
# TANPA Fastlane — pure xcodebuild + xcrun altool.
#
# ── SECRETS YANG PERLU DISIAPKAN DI GITHUB (Settings > Secrets and variables > Actions) ──
#
# BUILD_CERTIFICATE_BASE64      : Certificate distribution .p12, di-base64 encode
# P12_PASSWORD                   : Password untuk file .p12 tsb
# BUILD_PROVISION_PROFILE_BASE64: Provisioning profile (.mobileprovision), di-base64 encode
# KEYCHAIN_PASSWORD              : Password bebas untuk keychain sementara di CI
# APPSTORE_API_KEY_ID            : Key ID App Store Connect API Key
# APPSTORE_API_ISSUER_ID         : Issuer ID App Store Connect API
# APPSTORE_API_PRIVATE_KEY       : Isi file .p8, di-base64 encode
# APP_IDENTIFIER                  : Bundle identifier, misal com.namaperusahaan.appmu
# APPLE_TEAM_ID                   : Team ID Apple Developer
#
# ── CARA GENERATE BASE64 (jalankan di Mac lokal) ──
# base64 -i Certificates.p12 | pbcopy
# base64 -i Profile.mobileprovision | pbcopy
# base64 -i AuthKey_XXXXX.p8 | pbcopy

name: iOS Build & Deploy to App Store

on:
  push:
    tags:
      - "ios-v*"
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Submit langsung ke App Store review setelah upload? (kalau 'false' hanya upload ke TestFlight processing)"
        required: true
        default: "false"
        type: boolean

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    env:
      APP_NAME: "orthoceph"                    # sesuaikan nama app kamu
      XCODE_SCHEME: "orthoceph"                 # sesuaikan nama scheme
      XCODE_WORKSPACE: "ios/orthoceph.xcworkspace"  # sesuaikan path workspace
      EXPORT_METHOD: "app-store"

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      # ── Setup Node & install dependencies JS ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies JS
        run: | 
              rm -rf ios/Pods ios/Podfile.lock
              rm -rf ios/build
              rm -rf node_modules
              rm -rf ~/Library/Developer/Xcode/DerivedData
              rm -rf $TMPDIR/react-native-packager-cache-*
              npm install --force

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"


      - name: Bersihkan generated codegen lama
        run: rm -rf ios/build/generated
  
      # ── Install CocoaPods ──
      - name: Install Pods
        working-directory: ios
        run: pod install --repo-update

      # ── Set Xcode version yang dipakai ──
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Run Xcode first launch
        run: sudo xcodebuild -runFirstLaunch
        
        
      # ── Import certificate & provisioning profile ke keychain sementara ──
      - name: Import Code Signing Identity
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # decode secrets jadi file
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # buat keychain temporary
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate ke keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # taruh provisioning profile di lokasi yang dibaca Xcode
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # # ── Bump build number otomatis pakai run number CI ──
      # - name: Set build number
      #   working-directory: ios
      #   run: |
      #     /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$APP_NAME/Info.plist"

      # - name: Fix deployment target
      #   run: |
      #     sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.1;/g' ios/orthoceph.xcodeproj/project.pbxproj
      - name: List installed provisioning profiles
        run: |
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
            for file in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
              echo "=== $file ==="
              security cms -D -i "$file" | plutil -extract Name xml1 -o - -
            done

            
   # ── Buat ExportOptions.plist secara dinamis ──
      - name: Create ExportOptions.plist
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
         cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_IDENTIFIER</key>
                  <string>profile_orthoceph</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
      
          echo "=== Isi ExportOptions.plist yang di-generate ==="
          cat ios/ExportOptions.plist

      - name: Debug Bundle Identifier
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
        run: |
          echo "=== PRODUCT_BUNDLE_IDENTIFIER di project.pbxproj ==="
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/orthoceph.xcodeproj/project.pbxproj
      
          echo ""
          echo "=== Isi ExportOptions.plist ==="
          cat ios/ExportOptions.plist
      
          echo ""
          echo "=== APP_IDENTIFIER dari secret ==="
          echo "Panjang: $(echo -n "$APP_IDENTIFIER" | wc -c)"
          echo "Isi: $APP_IDENTIFIER"
      
      - name: Debug Bundle ID
        run: |
          xcodebuild -showBuildSettings \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -destination "generic/platform=iOS" | grep -i "PRODUCT_BUNDLE_IDENTIFIER\|CFBundleIdentifier"

   
    
                  
      # ── Archive app ──
      - name: Build Archive
        env:
            APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
            APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
        run: |
               mkdir -p "$RUNNER_TEMP/build"
               xcodebuild archive \
               -workspace "$XCODE_WORKSPACE" \
               -scheme "$XCODE_SCHEME" \
               -configuration Release \
               -archivePath "$RUNNER_TEMP/build/$APP_NAME.xcarchive" \
               -destination "generic/platform=iOS" \
               CODE_SIGN_STYLE=Manual \
               DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
               PROVISIONING_PROFILE_SPECIFIER="profile_orthoceph" \
               CODE_SIGN_IDENTITY="iPhone Distribution" \
               PRODUCT_BUNDLE_IDENTIFIER=$APP_IDENTIFIER 

     

       # ── Export .ipa dari archive ──
      - name: Export IPA
        run: |
           xcodebuild -exportArchive \
           -archivePath "$RUNNER_TEMP/build/$APP_NAME.xcarchive" \
           -exportOptionsPlist "ios/ExportOptions.plist" \
           -exportPath "$RUNNER_TEMP/build" \
           -allowProvisioningUpdates

      # # ── Tulis App Store Connect API key ke file ──
      # - name: Setup App Store Connect API Key
      #   env:
      #     APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
      #     APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      #   run: |
      #     mkdir -p ~/private_keys
      #     echo "$APPSTORE_API_PRIVATE_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      # # ── Upload ke App Store Connect (masuk TestFlight, status processing) ──
      # - name: Upload to App Store Connect
      #   env:
      #     APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
      #     APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
      #   run: |
      #     IPA_PATH=$(find "$RUNNER_TEMP/build" -name "*.ipa" | head -n 1)
      #     xcrun altool --upload-app \
      #       -f "$IPA_PATH" \
      #       -t ios \
      #       --apiKey "$APPSTORE_API_KEY_ID" \
      #       --apiIssuer "$APPSTORE_API_ISSUER_ID"

      # # ── Cleanup file sensitif ──
      # - name: Cleanup
      #   if: always()
      #   run: |
      #     rm -f ~/private_keys/AuthKey_*.p8
      #     security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

     # ── Simpan IPA sebagai artifact GitHub Actions (opsional, untuk debug) ──
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ${{ runner.temp }}/build/*.ipa
          if-no-files-found: ignore


  simulator-test:
    runs-on: macos-14
    timeout-minutes: 30

    env:
      APP_NAME: "orthoceph"
      XCODE_SCHEME: "orthoceph"
      XCODE_WORKSPACE: "ios/orthoceph.xcworkspace"
      SIMULATOR_NAME: "iPhone 15"

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies JS
        run: |
             rm -rf node_modules
             rm -rf ios/Pods ios/Podfile.lock
             rm -rf ~/Library/Developer/Xcode/DerivedData
             rm -rf build
             npm install --force

              
      - name: Install Pods
        working-directory: ios
        run: pod install --repo-update

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: List simulator yang tersedia
        run: xcrun simctl list devices available

      # ── Build khusus untuk simulator (tanpa code signing) ──
      - name: Build for Simulator
        run: |
          mkdir -p "$RUNNER_TEMP/build-sim"
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -derivedDataPath "$RUNNER_TEMP/build-sim" \
            CODE_SIGNING_ALLOWED=NO

      - name: Cari path .app hasil build
        id: find_app
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/build-sim" -name "*.app" -path "*Release-iphonesimulator*" | head -n 1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Ditemukan: $APP_PATH"

      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_NAME" || true
          xcrun simctl bootstatus "$SIMULATOR_NAME" -b
          

      - name: Install idb
        run: |
          brew tap facebook/fb
          brew trust facebook/fb
          brew install idb-companion
          pip3 install fb-idb --break-system-packages
          brew install idb-companion python@3.11

          /opt/homebrew/opt/python@3.11/bin/python3.11 -m venv $RUNNER_TEMP/idb-venv
          source $RUNNER_TEMP/idb-venv/bin/activate
          pip install fb-idb
          echo "$RUNNER_TEMP/idb-venv/bin" >> $GITHUB_PATH

          
          
      - name: Install app ke simulator
        run: |
          xcrun simctl install booted "${{ steps.find_app.outputs.app_path }}"

      # ── Ambil bundle id langsung dari Info.plist hasil build ──
      - name: Ambil Bundle Identifier
        id: bundle_id
        run: |
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "${{ steps.find_app.outputs.app_path }}/Info.plist")
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          echo "Bundle ID: $BUNDLE_ID"

      # ── Mulai rekam log sistem simulator ke file, jalan di background ──
      - name: Mulai capture log simulator
        run: |
          xcrun simctl spawn booted log stream \
            --predicate "processImagePath CONTAINS \"${{ steps.find_app.outputs.app_path }}\" OR subsystem CONTAINS \"${{ steps.bundle_id.outputs.bundle_id }}\"" \
            > "$RUNNER_TEMP/simulator.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/log_pid"

      - name: Launch app & capture output langsung
        run: |
          xcrun simctl launch --console-pty booted "${{ steps.bundle_id.outputs.bundle_id }}" \
            > "$RUNNER_TEMP/simulator.log" 2>&1 &
          LAUNCH_PID=$!
          echo "$LAUNCH_PID" > "$RUNNER_TEMP/launch_pid"
          sleep 15
          echo "=== Log app (console-pty) ==="
          cat "$RUNNER_TEMP/simulator.log" || echo "Log kosong"

          
      - name: Cek exit code launch & tunggu app stabil
        run: |
          xcrun simctl launch booted "${{ steps.bundle_id.outputs.bundle_id }}"
          LAUNCH_EXIT=$?
          echo "Launch exit code: $LAUNCH_EXIT"
          sleep 3
          echo "=== Cek proses yang jalan di simulator ==="
          xcrun simctl spawn booted launchctl list | grep -i orthoceph || echo "App TIDAK ditemukan running"

      - name: Cek crash log kalau ada
        run: |
          echo "=== Mencari crash report ==="
          CRASH_DIR=~/Library/Logs/DiagnosticReports
          if [ -d "$CRASH_DIR" ]; then
            find "$CRASH_DIR" -iname "*orthoceph*" -mmin -10 -exec echo "--- {} ---" \; -exec cat {} \;
          else
            echo "Folder crash report tidak ditemukan"
          fi

          echo ""
          echo "=== Isi 100 baris terakhir simulator.log ==="
          tail -n 100 "$RUNNER_TEMP/simulator.log" || echo "simulator.log tidak ditemukan"
      #- name: Tunggu app render (beri waktu untuk load)
      # run: sleep 15

      - name: Ambil screenshot
        run: |
          mkdir -p "$RUNNER_TEMP/screenshots"
          xcrun simctl io booted screenshot "$RUNNER_TEMP/screenshots/screenshot-01.png"

      - name: Hentikan capture log
        if: always()
        run: |
          kill "$(cat "$RUNNER_TEMP/log_pid")" || true

      - name: Upload screenshot sebagai artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: ${{ runner.temp }}/screenshots/*.png
          if-no-files-found: warn

      - name: Upload log simulator sebagai artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-log
          path: ${{ runner.temp }}/simulator.log
          if-no-files-found: warn  

      - name: Setup UDID sebagai env var
        run: |
            UDID=$(xcrun simctl list devices booted -j | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print([x['udid'] for v in d.values() for x in v if x.get('state')=='Booted'][0])")
            echo "Ditemukan UDID: $UDID"
            echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"



      - name: Start idb companion
        run: |
            idb_companion --udid "$SIM_UDID" &
            sleep 3
            idb list-targets



      - name: Dismiss location permission dialog
        run: |
             idb ui tap 196 497 --udid "$SIM_UDID"
             sleep 2


 
      - name: Describe elemen layar login
        run: idb ui describe-all --udid "$SIM_UDID" --json > "$RUNNER_TEMP/describe.json"



      - name: Tampilkan hasil describe
        run: cat "$RUNNER_TEMP/describe.json" | python3 -m json.tool
          

   
             
      - name: Test login flow
        run: |
          UDID=$(xcrun simctl list devices booted -j | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print([x['udid'] for v in d.values() for x in v if x.get('state')=='Booted'][0])")
      
          # Tap field username (ganti X,Y sesuai hasil describe-all)
          idb ui tap 195 400 --udid "$SIM_UDID"
          sleep 2
          idb ui text "user@example.com" --udid "$SIM_UDID"
      
          # Tap field password
          idb ui tap 195 460 --udid "$SIM_UDID"
          sleep 2
          idb ui text "password123" --udid "$SIM_UDID"

          #tap centang
          idb ui tap 95 590 --udid "$SIM_UDID"
          sleep 1
    
          # Tap tombol login
          idb ui tap 195 520 --udid "$SIM_UDID"
          sleep 3
      
      - name: Screenshot hasil login
        run: |
          mkdir -p "$RUNNER_TEMP/screenshots"
          idb screenshot "$RUNNER_TEMP/screenshots/after-login.png" --udid $SIM_UDID  

      - name: Upload screenshot login sebagai artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-screenshot
          path: ${{ runner.temp }}/screenshots/after-login.png
          if-no-files-found: warn
