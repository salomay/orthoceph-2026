name: Android Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies JS
        run: npm install --force

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission ke gradlew
        run: chmod +x android/gradlew
        
      - name: Fix permission hermesc binary
        run: chmod +x node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
        
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease -Preact.hermesCommand=../node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
 
      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
