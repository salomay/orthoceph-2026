// Top-level build file where you can add configuration options common to all sub-projects/modules.
def REACT_NATIVE_VERSION = new File(['node', '--print',"JSON.parse(require('fs').readFileSync(require.resolve('react-native/package.json'), 'utf-8')).version"].execute(null, rootDir).text.trim())

buildscript {
    ext {
        buildToolsVersion = "29.0.2"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        kotlinVersion = "1.6.21"
        googlePlayServicesAuthVersion = "19.2.0"
        // pdfViewerVersion = "3.1.0-beta.1" 
         ndkVersion = "29.0.14206865" // Use NDK 27+ or 28+
    }
    repositories {
        google()
        //  jcenter()
         mavenCentral()
          maven { url 'https://jitpack.io' } // Add this line
       
    }
    dependencies {
        // classpath 'com.android.tools.build:gradle:4.2.2'
        // classpath 'com.google.gms:google-services:4.3.15'
         classpath("com.android.tools.build:gradle:8.10.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath 'com.google.gms:google-services:+'
        // classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.6.21"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }

   
}

allprojects {
    repositories {
       
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }

        maven { 
            url "https://repository.liferay.com/nexus/content/repositories/public" 
             }

        google()
        // jcenter()
        maven { url 'https://www.jitpack.io' }
        mavenCentral()
        mavenLocal()
        gradlePluginPortal()
         
    }
    configurations.all {
        resolutionStrategy {
            // Remove this override in 0.66, as a proper fix is included in react-native itself.
            force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
            force 'androidx.collection:collection:1.4.0'
            force 'androidx.collection:collection-jvm:1.4.0'
            force 'androidx.core:core:1.8.0' 
            force 'androidx.appcompat:appcompat:1.7.0'
            force 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.4'
            force 'androidx.activity:activity-ktx:1.9.1' 
            force "androidx.core:core-ktx:1.13.1"
            force "androidx.activity:activity-ktx:1.8.2"
    
    // If you are using Jetpack Compose, update this as well
    implementation "androidx.activity:activity-compose:1.8.2"
        }
    }
}
apply plugin: "com.facebook.react.rootproject"

